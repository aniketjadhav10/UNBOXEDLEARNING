<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4c1d95" />
    <meta name="description" content="UnBoxed Learning — Modern homeschool management for curriculum, kids, and progress tracking." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/pwa-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/pwa-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>UnBoxed Learning — Homeschool Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Enforce strict zoom restriction for a seamless standalone PWA/native feel
      (function() {
        const preventZoom = function() {
          // 1. Prevent iOS safari pinch-to-zoom
          document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
          }, { passive: false });
          
          document.addEventListener('gesturechange', function(e) {
            e.preventDefault();
          }, { passive: false });

          // 2. Prevent mobile browser double-tap zoom
          let lastTouchEnd = 0;
          document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
              e.preventDefault();
            }
            lastTouchEnd = now;
          }, { passive: false });
        };

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          preventZoom();
        } else {
          document.addEventListener('DOMContentLoaded', preventZoom);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
